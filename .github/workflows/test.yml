name: ParkSignals Tests

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        run: python -m unittest discover -s tests

      - name: Run Dry Run
        run: python scripts/dry_run.py --data samples/dry_run_queue_times.json --output-dir outputs

      - name: Upload Dry Run Outputs
        uses: actions/upload-artifact@v4
        with:
          name: parksignals-dry-run-outputs
          path: outputs/

name: ParkSignals Daily Summary

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PARKSIGNALS_X_POSTING_ENABLED: "false"
  X_API_KEY: ${{ secrets.X_API_KEY }}
  X_API_SECRET: ${{ secrets.X_API_SECRET }}
  X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
  X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
  X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

jobs:
  daily-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repo
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Generate Daily Summary
        run: |
          rm -rf outputs
          mkdir -p outputs
          python scripts/export_artifacts.py --output-dir outputs
          python scripts/export_x_status.py --output-dir outputs
          python scripts/plan_posts.py --output-dir outputs
          python scripts/dispatch_posts.py --output-dir outputs

      - name: Upload Daily Summary Outputs
        uses: actions/upload-artifact@v4
        with:
          name: parksignals-daily-summary
          path: outputs/

      - name: Commit Posting Log
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posting_log.json
          if git diff --cached --quiet; then
            echo "No posting log changes"
            exit 0
          fi
          git commit -m "Update posting log"
          git pull --rebase origin main
          git push

name: ParkSignals Park Hours

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4,10,16,22 * * *"

permissions:
  contents: write

concurrency:
  group: parksignals-main-writes
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  park-hours:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repo
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Browser Renderer
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Fetch Official Disney Park Hours
        run: python scripts/fetch_park_hours.py --output park_hours_cache.json

      - name: Upload Park Hours Cache
        uses: actions/upload-artifact@v4
        with:
          name: parksignals-park-hours-cache
          path: park_hours_cache.json

      - name: Commit Park Hours Cache
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          cp park_hours_cache.json /tmp/parksignals-park-hours-cache.json
          git fetch origin main
          git reset --hard origin/main
          git clean -fdX
          cp /tmp/parksignals-park-hours-cache.json park_hours_cache.json

          git add park_hours_cache.json
          if git diff --cached --quiet; then
            echo "No park hours cache changes"
            exit 0
          fi
          git commit -m "Update park hours cache"
          git push

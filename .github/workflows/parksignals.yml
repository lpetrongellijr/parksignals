name: ParkSignals Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: parksignals-main-writes
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repo
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run ParkSignals
        timeout-minutes: 8
        run: |
          set -o pipefail
          rm -rf outputs
          mkdir -p outputs
          : > outputs/run-timing.txt

          run_timed() {
            local name="$1"
            shift
            local started_at
            local ended_at
            local start_seconds
            local end_seconds
            local duration_seconds
            started_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            start_seconds=$(date -u +%s)
            echo "Starting ${name} at ${started_at}"
            "$@"
            local status=$?
            ended_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            end_seconds=$(date -u +%s)
            duration_seconds=$((end_seconds - start_seconds))
            echo "- ${name}: ${duration_seconds}s (exit ${status}, ${started_at} to ${ended_at})" | tee -a outputs/run-timing.txt
            return ${status}
          }

          run_timed "run_monitor" bash -o pipefail -c 'python scripts/run_monitor.py | tee outputs/monitor-summary.txt'
          run_timed "update_data_capture" python scripts/update_data_capture.py
          run_timed "export_public_site_data" python scripts/export_public_site_data.py
          run_timed "export_artifacts" python scripts/export_artifacts.py --output-dir outputs

      - name: Upload Monitor Outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parksignals-monitor-outputs
          path: outputs/

      - name: Commit Updated State, Analytics History, And Public Data
        timeout-minutes: 4
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          mkdir -p /tmp/parksignals-generated
          cp state.json /tmp/parksignals-generated/state.json
          cp analytics_history.json /tmp/parksignals-generated/analytics_history.json
          cp public/data/latest.json /tmp/parksignals-generated/latest.json
          cp public/data/history.json /tmp/parksignals-generated/history.json
          cp public/data/intraday.json /tmp/parksignals-generated/intraday.json

          git fetch origin main
          git reset --hard origin/main
          git clean -fdX

          cp /tmp/parksignals-generated/state.json state.json
          cp /tmp/parksignals-generated/analytics_history.json analytics_history.json
          mkdir -p public/data
          cp /tmp/parksignals-generated/latest.json public/data/latest.json
          cp /tmp/parksignals-generated/history.json public/data/history.json
          cp /tmp/parksignals-generated/intraday.json public/data/intraday.json

          git add state.json analytics_history.json public/data/latest.json public/data/history.json public/data/intraday.json
          if git diff --cached --quiet; then
            echo "No state, analytics history, or public data changes"
            exit 0
          fi
          git commit -m "Update ParkSignals state and public data"
          git push

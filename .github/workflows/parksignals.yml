name: ParkSignals Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PARKSIGNALS_POST_CONTEXT: "monitor"
  PARKSIGNALS_X_POSTING_ENABLED: ${{ vars.PARKSIGNALS_X_POSTING_ENABLED }}
  X_API_KEY: ${{ secrets.X_API_KEY }}
  X_API_SECRET: ${{ secrets.X_API_SECRET }}
  X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
  X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
  X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repo
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run ParkSignals
        timeout-minutes: 8
        run: |
          set -o pipefail
          rm -rf outputs
          mkdir -p outputs
          : > outputs/run-timing.txt

          run_timed() {
            local name="$1"
            shift
            local started_at
            local ended_at
            local start_seconds
            local end_seconds
            local duration_seconds
            started_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            start_seconds=$(date -u +%s)
            echo "Starting ${name} at ${started_at}"
            "$@"
            local status=$?
            ended_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            end_seconds=$(date -u +%s)
            duration_seconds=$((end_seconds - start_seconds))
            echo "- ${name}: ${duration_seconds}s (exit ${status}, ${started_at} to ${ended_at})" | tee -a outputs/run-timing.txt
            return ${status}
          }

          run_timed "run_monitor" bash -o pipefail -c 'python scripts/run_monitor.py | tee outputs/monitor-summary.txt'
          run_timed "update_data_capture" python scripts/update_data_capture.py
          run_timed "export_public_site_data" python scripts/export_public_site_data.py
          run_timed "export_artifacts" python scripts/export_artifacts.py --output-dir outputs
          run_timed "export_x_status" python scripts/export_x_status.py --output-dir outputs
          run_timed "plan_posts" python scripts/plan_posts.py --output-dir outputs --post-context monitor
          run_timed "dispatch_posts" python scripts/dispatch_posts.py --output-dir outputs

      - name: Upload Monitor Outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parksignals-monitor-outputs
          path: outputs/

      - name: Commit Updated State, Analytics History, Posting Log, And Public Data
        timeout-minutes: 4
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json analytics_history.json posting_log.json public/data/latest.json public/data/history.json
          if git diff --cached --quiet; then
            echo "No state, analytics history, posting log, or public data changes"
            exit 0
          fi
          git commit -m "Update ParkSignals state and public data"
          git status --short
          git reset --hard HEAD
          git clean -fdX
          git fetch origin main
          git rebase origin/main
          git push

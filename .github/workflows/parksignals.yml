name: ParkSignals Monitor

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repo
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run ParkSignals
        run: |
          rm -rf outputs
          mkdir -p outputs
          python scripts/run_monitor.py | tee outputs/monitor-summary.txt
          python scripts/export_artifacts.py --output-dir outputs

      - name: Upload Monitor Outputs
        uses: actions/upload-artifact@v4
        with:
          name: parksignals-monitor-outputs
          path: outputs/

      - name: Commit Updated State
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git commit -m "Update ride state" || echo "No changes"
          git push

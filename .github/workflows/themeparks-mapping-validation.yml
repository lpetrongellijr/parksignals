name: ThemeParks Wiki Mapping Validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-themeparks-mapping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Unit Tests
        run: python -m unittest discover -s tests

      - name: Validate ThemeParks Wiki Mapping
        run: |
          rm -rf outputs
          mkdir -p outputs
          python scripts/validate_themeparks_mapping.py | tee outputs/themeparks-wiki-mapping-summary.txt

      - name: Upload Mapping Outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: themeparks-wiki-mapping-validation
          path: outputs/

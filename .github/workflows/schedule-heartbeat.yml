name: ParkSignals Schedule Heartbeat

on:
  schedule:
    - cron: "19 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repo
        run: git pull --rebase origin main

      - name: Write Heartbeat
        run: |
          mkdir -p outputs
          date -u +"%Y-%m-%dT%H:%M:%SZ" | tee outputs/schedule-heartbeat.txt

      - name: Upload Heartbeat
        uses: actions/upload-artifact@v4
        with:
          name: parksignals-schedule-heartbeat
          path: outputs/schedule-heartbeat.txt

      - name: Commit Heartbeat
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add outputs/schedule-heartbeat.txt
          git commit -m "Update schedule heartbeat" || echo "No changes"
          git push
